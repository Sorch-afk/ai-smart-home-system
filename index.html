<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小米智能家居AI大脑 - 情感化AI管家</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <span class="logo-icon">🏠</span>
                <h1>小米智能家居AI大脑</h1>
                <span class="badge">AI管家</span>
            </div>
            <nav>
                <ul>
                    <li><a href="#chat">AI对话</a></li>
                    <li><a href="#devices">设备</a></li>
                    <li><a href="#scenes">场景</a></li>
                    <li><a href="#energy">能耗</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section id="welcome" class="welcome-section">
        <div class="container">
            <div class="welcome-card">
                <div class="welcome-icon">🏠</div>
                <h2 id="greeting-text">欢迎使用小米智能家居AI大脑</h2>
                <p id="greeting-sub">你的AI私人管家，懂你也关心你</p>
                <div class="user-setup" id="user-setup">
                    <input type="text" id="user-name" placeholder="你的名字是？" />
                    <button class="btn-primary" onclick="setUserName()">开始体验</button>
                </div>
            </div>
        </div>
    </section>

    <section id="chat">
        <div class="container">
            <div class="chat-layout">
                <div class="chat-main">
                    <div class="chat-header">
                        <h3>💬 AI管家对话</h3>
                        <span id="emotion-indicator" class="emotion-badge"></span>
                    </div>
                    <div class="chat-messages" id="chat-messages"></div>
                    <div class="chat-input-container">
                        <div class="quick-actions">
                        <button class="quick-btn" onclick="quickChat('我回来了')">🏠 我回来了</button>
                        <button class="quick-btn" onclick="quickChat('今天好热啊')">🌡️ 今天好热</button>
                        <button class="quick-btn" onclick="quickChat('好累啊')">😴 好累</button>
                        <button class="quick-btn" onclick="quickChat('打开回家模式')">🎬 回家模式</button>
                    </div>
                    <div class="quick-actions">
                        <button class="quick-btn" onclick="quickChat('今天天气怎么样')">🌤️ 天气</button>
                        <button class="quick-btn" onclick="quickChat('推荐今天的食谱')">🍜 食谱</button>
                        <button class="quick-btn" onclick="quickChat('有什么健康小贴士')">💪 健康</button>
                        <button class="quick-btn" onclick="quickChat('给我讲个笑话')">😂 笑话</button>
                        <button class="quick-btn" onclick="quickChat('今天有什么新闻')">📰 新闻</button>
                        <button class="quick-btn" onclick="quickChat('推荐几部电影')">🎬 电影</button>
                    </div>
                        <div class="input-row">
                            <input type="text" id="chat-input" placeholder="和AI管家聊聊吧..." onkeypress="handleChatKeypress(event)">
                            <button class="btn-send" onclick="sendChat()">发送</button>
                        </div>
                    </div>
                </div>
                <div class="chat-sidebar">
                    <div class="sidebar-card">
                        <h4>📊 设备状态</h4>
                        <div id="device-status-list"></div>
                    </div>
                    <div class="sidebar-card">
                        <h4>🎯 快捷场景</h4>
                        <div id="quick-scenes"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="devices">
        <div class="container">
            <h2>设备管理</h2>
            <div class="devices-grid" id="devices-grid"></div>
        </div>
    </section>

    <section id="scenes">
        <div class="container">
            <h2>智能场景</h2>
            <div class="scenes-grid" id="scenes-grid"></div>
        </div>
    </section>

    <section id="energy">
        <div class="container">
            <h2>能耗分析</h2>
            <div class="energy-container">
                <div class="energy-summary">
                    <div class="energy-item">
                        <h3 id="total-energy">-</h3>
                        <p>总用电(kWh)</p>
                    </div>
                    <div class="energy-item">
                        <h3 id="total-cost">-</h3>
                        <p>预计费用(元)</p>
                    </div>
                </div>
                <div class="device-energy" id="device-energy"></div>
                <div class="energy-suggestions">
                    <h3>💡 节能建议</h3>
                    <div id="suggestions-list"></div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2024 小米智能家居AI大脑 | 情感化AI管家系统</p>
        </div>
    </footer>

    <script src="static/js/app.js"></script>
</body>
</html>
